<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPulse 360 - Diet Planner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Diet Planner Specific Styles */
        .diet-hero {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            border-radius: 30px;
            padding: 3rem;
            margin-bottom: 3rem;
            position: relative;
            overflow: hidden;
            color: white;
        }
        
        .diet-hero::before {
            content: '🥗';
            position: absolute;
            right: 20px;
            bottom: 20px;
            font-size: 8rem;
            opacity: 0.1;
            transform: rotate(15deg);
        }

        .planner-container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            margin: 2rem 0;
        }

        /* Input Form Styles */
        .input-form {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 2rem;
            border: 2px solid #27ae60;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .form-title {
            font-size: 1.8rem;
            color: #27ae60;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 1rem;
        }

        .form-control:focus {
            outline: none;
            border-color: #27ae60;
        }

        .radio-group {
            display: flex;
            gap: 2rem;
            margin: 0.5rem 0;
            flex-wrap: wrap;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .radio-option input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: #27ae60;
        }

        .food-type-group {
            display: flex;
            gap: 2rem;
            margin: 1rem 0;
            padding: 1rem;
            background: var(--bg-primary);
            border-radius: 12px;
        }

        .food-type-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .food-type-label.veg {
            background: rgba(39, 174, 96, 0.1);
            border: 2px solid #27ae60;
        }

        .food-type-label.nonveg {
            background: rgba(231, 76, 60, 0.1);
            border: 2px solid #e74c3c;
        }

        .food-type-label input[type="radio"] {
            margin-right: 0.5rem;
            accent-color: #27ae60;
        }

        .generate-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .generate-btn:hover {
            background: #2ecc71;
            transform: scale(1.02);
        }

        /* Diet Plan Display */
        .diet-plan {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 2rem;
            border: 2px solid #27ae60;
        }

        .plan-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }

        .user-info {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            background: var(--bg-primary);
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 2rem;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .info-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #27ae60;
        }

        .food-type-badge {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }

        .food-type-badge.veg {
            background: #27ae60;
            color: white;
        }

        .food-type-badge.nonveg {
            background: #e74c3c;
            color: white;
        }

        .nutrition-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 2rem 0;
        }

        .nutrition-card {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            padding: 1.5rem;
            border-radius: 16px;
            color: white;
            text-align: center;
        }

        .nutrition-value {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .nutrition-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .meal-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .meal-card {
            background: var(--bg-primary);
            border-radius: 16px;
            padding: 1.5rem;
            border-left: 4px solid #27ae60;
        }

        .meal-time {
            font-size: 1.2rem;
            font-weight: 700;
            color: #27ae60;
            margin-bottom: 1rem;
        }

        .meal-items {
            list-style: none;
            padding: 0;
        }

        .meal-items li {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
        }

        .meal-items li:last-child {
            border-bottom: none;
        }

        .food-name {
            color: var(--text-primary);
        }

        .food-calories {
            color: #27ae60;
            font-weight: 600;
        }

        .weekly-plan {
            margin-top: 3rem;
        }

        .day-tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }

        .day-tab {
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .day-tab:hover {
            border-color: #27ae60;
        }

        .day-tab.active {
            background: #27ae60;
            color: white;
            border-color: #27ae60;
        }

        .shopping-list {
            background: var(--bg-primary);
            border-radius: 16px;
            padding: 2rem;
            margin-top: 2rem;
        }

        .shopping-list h3 {
            color: #27ae60;
            margin-bottom: 1rem;
        }

        .shopping-items {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .shopping-category {
            background: var(--bg-card);
            padding: 1rem;
            border-radius: 12px;
        }

        .category-title {
            font-weight: 700;
            color: #27ae60;
            margin-bottom: 0.5rem;
        }

        .download-options {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .download-btn {
            flex: 1;
            background: #27ae60;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background: #2ecc71;
            transform: scale(1.02);
        }

        .download-btn.pdf {
            background: #e74c3c;
        }

        .download-btn.pdf:hover {
            background: #c0392b;
        }

        .bmi-indicator {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-left: 1rem;
        }

        .bmi-underweight { background: #3498db; color: white; }
        .bmi-normal { background: #27ae60; color: white; }
        .bmi-overweight { background: #f39c12; color: white; }
        .bmi-obese { background: #e74c3c; color: white; }

        @media (max-width: 1200px) {
            .planner-container {
                grid-template-columns: 1fr;
            }
            .meal-grid {
                grid-template-columns: 1fr;
            }
            .shopping-items {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

        <div class="logo">
            <i class="fas fa-leaf"></i>

        </div>
        <div class="nav-right">
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i> Dark Mode
            </button>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="dashboard-container">
        <!-- Diet Hero -->
        <div class="diet-hero">
            <h1 style="font-size: 3rem; margin-bottom: 0.5rem;">
                <i class="fas fa-utensils"></i> 
                Personalized Diet Planner
            </h1>
            <p style="color: rgba(255,255,255,0.9); font-size: 1.2rem; max-width: 600px;">
                Get customized meal plans based on your food preferences - Vegetarian or Non-Vegetarian!
            </p>
        </div>

        <!-- Main Planner Container -->
        <div class="planner-container">
            <!-- Input Form -->
            <div class="input-form" id="inputForm">
                <div class="form-title">
                    <i class="fas fa-user"></i>
                    Your Information
                </div>

                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Enter your name" value="Shrikrushna Satpute">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-venus-mars"></i> Gender</label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="gender" value="male" checked> Male
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="gender" value="female"> Female
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="gender" value="other"> Other
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-calendar"></i> Age</label>
                    <input type="number" id="age" class="form-control" placeholder="Years" min="15" max="100" value="19">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-weight"></i> Weight (kg)</label>
                    <input type="number" id="weight" class="form-control" placeholder="kg" min="30" max="200" value="60">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-ruler"></i> Height (cm)</label>
                    <input type="number" id="height" class="form-control" placeholder="cm" min="100" max="250" value="170">
                </div>

                <!-- Food Type Selection - VEG / NON-VEG -->
                <div class="form-group">
                    <label><i class="fas fa-utensils"></i> Food Preference <span style="color: #e74c3c;">*Important</span></label>
                    <div class="food-type-group">
                        <label class="food-type-label veg">
                            <input type="radio" name="foodType" value="veg" checked> 
                            <span style="color: #27ae60;">🌱 Vegetarian</span>
                        </label>
                        <label class="food-type-label nonveg">
                            <input type="radio" name="foodType" value="nonveg"> 
                            <span style="color: #e74c3c;">🍗 Non-Vegetarian</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-bullseye"></i> Diet Category</label>
                    <select id="dietCategory" class="form-control">
                        <option value="weight-loss">Weight Loss</option>
                        <option value="weight-gain">Weight Gain</option>
                        <option value="maintenance" selected>Maintenance</option>
                        <option value="keto">Keto Diet</option>
                        <option value="high-protein">High Protein</option>
                        <option value="low-carb">Low Carb</option>
                        <option value="mediterranean">Mediterranean</option>
                        <option value="diabetic">Diabetic Friendly</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-heartbeat"></i> Activity Level</label>
                    <select id="activityLevel" class="form-control">
                        <option value="1.2">Sedentary (Little or no exercise)</option>
                        <option value="1.375">Light (1-3 days/week)</option>
                        <option value="1.55" selected>Moderate (3-5 days/week)</option>
                        <option value="1.725">Active (6-7 days/week)</option>
                        <option value="1.9">Very Active (Athlete)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-exclamation-triangle"></i> Allergies/Preferences</label>
                    <input type="text" id="allergies" class="form-control" placeholder="e.g., nuts, dairy, gluten (optional)">
                </div>

                <button class="generate-btn" onclick="generateDietPlan()">
                    <i class="fas fa-magic"></i> Generate My Diet Plan
                </button>
            </div>

            <!-- Diet Plan Display -->
            <div class="diet-plan" id="dietPlan">
                <div class="plan-header">
                    <h2 style="color: #27ae60;">Your Personalized Diet Plan</h2>
                    <span id="planDate" style="color: var(--text-secondary);"></span>
                </div>

                <!-- User Info Display -->
                <div class="user-info" id="userInfo">
                    <!-- Dynamically populated -->
                </div>

                <!-- Nutrition Summary -->
                <div class="nutrition-summary" id="nutritionSummary">
                    <!-- Dynamically populated -->
                </div>

                <!-- Daily Meal Plan -->
                <h3 style="color: #27ae60; margin: 2rem 0 1rem;">
                    <i class="fas fa-sun"></i> Today's Meal Plan
                </h3>
                <div class="meal-grid" id="mealGrid">
                    <!-- Dynamically populated -->
                </div>

                <!-- Weekly Plan Tabs -->
                <div class="weekly-plan">
                    <h3 style="color: #27ae60;">
                        <i class="fas fa-calendar-week"></i> Weekly Meal Plan
                    </h3>
                    <div class="day-tabs" id="dayTabs">
                        <button class="day-tab active" onclick="showDay('monday')">Monday</button>
                        <button class="day-tab" onclick="showDay('tuesday')">Tuesday</button>
                        <button class="day-tab" onclick="showDay('wednesday')">Wednesday</button>
                        <button class="day-tab" onclick="showDay('thursday')">Thursday</button>
                        <button class="day-tab" onclick="showDay('friday')">Friday</button>
                        <button class="day-tab" onclick="showDay('saturday')">Saturday</button>
                        <button class="day-tab" onclick="showDay('sunday')">Sunday</button>
                    </div>
                    <div id="weeklyMealPlan" style="margin-top: 2rem;">
                        <!-- Dynamically populated -->
                    </div>
                </div>

                <!-- Shopping List -->
                <div class="shopping-list" id="shoppingList">
                    <!-- Dynamically populated -->
                </div>

                <!-- Download Options -->
                <div class="download-options">
                    <button class="download-btn" onclick="downloadPlanAsText()">
                        <i class="fas fa-download"></i> Download as Text
                    </button>
                    <button class="download-btn pdf" onclick="downloadPlanAsHTML()">
                        <i class="fas fa-file-pdf"></i> Download as HTML
                    </button>
                    <button class="download-btn" onclick="downloadShoppingList()">
                        <i class="fas fa-shopping-cart"></i> Shopping List
                    </button>
                </div>
            </div>
        </div>
    </div>

        // Calculate BMI
        function calculateBMI(weight, height) {
            const heightInMeters = height / 100;
            const bmi = weight / (heightInMeters * heightInMeters);
            return bmi.toFixed(1);
        }

        // Get BMI Category
        function getBMICategory(bmi) {
            if (bmi < 18.5) return { category: 'Underweight', class: 'bmi-underweight' };
            if (bmi < 25) return { category: 'Normal', class: 'bmi-normal' };
            if (bmi < 30) return { category: 'Overweight', class: 'bmi-overweight' };
            return { category: 'Obese', class: 'bmi-obese' };
        }

        // Calculate BMR (Basal Metabolic Rate)
        function calculateBMR(weight, height, age, gender) {
            if (gender === 'male') {
                return 88.362 + (13.397 * weight) + (4.799 * height) - (5.677 * age);
            } else {
                return 447.593 + (9.247 * weight) + (3.098 * height) - (4.330 * age);
            }
        }

        // Calculate Daily Calories
        function calculateDailyCalories(bmr, activityLevel, dietCategory) {
            let calories = bmr * parseFloat(activityLevel);
            
            // Adjust based on diet category
            if (dietCategory === 'weight-loss') {
                calories -= 500; // Deficit
            } else if (dietCategory === 'weight-gain') {
                calories += 500; // Surplus
            }
            
            return Math.round(calories);
        }

            const dietCategory = document.getElementById('dietCategory').value;
            const activityLevel = document.getElementById('activityLevel').value;
            const allergies = document.getElementById('allergies').value;

            // Calculate metrics
            const bmi = calculateBMI(weight, height);
            const bmiCategory = getBMICategory(bmi);
            const bmr = calculateBMR(weight, height, age, gender);
            const dailyCalories = calculateDailyCalories(bmr, activityLevel, dietCategory);

            // Store user data
            currentUser = {
                name, gender, age, weight, height, 
                foodType, dietCategory, activityLevel, allergies,
                bmi, bmiCategory, dailyCalories

            // Update User Info Display

            // Update Weekly Plan

        document.getElementById('themeToggle').addEventListener('click', function() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
